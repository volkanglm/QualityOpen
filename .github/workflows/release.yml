name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build-macos-release:
    name: Build & Release macOS
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 90
    outputs:
      mac_sig: ${{ steps.read_sig.outputs.mac_sig }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          python3 -c "import base64, os; cert = os.environ['APPLE_CERTIFICATE'].strip(); open('certificate.p12','wb').write(base64.b64decode(cert))"
          PASSWORD=$(echo "$APPLE_CERTIFICATE_PASSWORD" | xargs)
          security create-keychain -p "$(openssl rand -base64 32)" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Build Tauri app (universal)
        run: pnpm tauri build --target universal-apple-darwin
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          echo "Notarizing $DMG_PATH..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "Stapling ticket..."
          xcrun stapler staple "$DMG_PATH"

      - name: Read macOS signature
        id: read_sig
        run: |
          SIG_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig | head -1)
          SIG_CONTENT=$(cat "$SIG_FILE" | tr -d '\n')
          echo "mac_sig=$SIG_CONTENT" >> $GITHUB_OUTPUT

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-release:
    name: Build & Release Windows
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      win_sig: ${{ steps.read_sig.outputs.win_sig }}
      win_filename: ${{ steps.read_sig.outputs.win_filename }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Read Windows signature
        id: read_sig
        shell: pwsh
        run: |
          $zipSig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.nsis.zip.sig" | Select-Object -First 1
          $zipFile = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.nsis.zip" | Select-Object -First 1
          $sig = (Get-Content $zipSig.FullName -Raw) -replace "`r`n|`r|`n", ""
          echo "win_sig=$sig" >> $env:GITHUB_OUTPUT
          echo "win_filename=$($zipFile.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Generate latest.json & Publish
    needs: [build-macos-release, build-windows-release]
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json
        env:
          MAC_SIG: ${{ needs.build-macos-release.outputs.mac_sig }}
          WIN_SIG: ${{ needs.build-windows-release.outputs.win_sig }}
          WIN_FILENAME: ${{ needs.build-windows-release.outputs.win_filename }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          python3 - << 'PYEOF'
          import os, json
          version = os.environ['GITHUB_REF_NAME'].lstrip('v')
          tag = os.environ['GITHUB_REF_NAME']
          pub_date = os.environ.get('PUB_DATE', '')
          mac_sig = os.environ['MAC_SIG']
          win_sig = os.environ['WIN_SIG']
          win_filename = os.environ['WIN_FILENAME']

          data = {
            "version": version,
            "notes": "See full release notes on GitHub.",
            "pub_date": pub_date,
            "platforms": {
              "darwin-aarch64": {
                "signature": mac_sig,
                "url": f"https://github.com/volkanglm/QualityOpen/releases/download/{tag}/QualityOpen.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": mac_sig,
                "url": f"https://github.com/volkanglm/QualityOpen/releases/download/{tag}/QualityOpen.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": win_sig,
                "url": f"https://github.com/volkanglm/QualityOpen/releases/download/{tag}/{win_filename}"
              }
            }
          }

          with open('latest.json', 'w') as f:
            json.dump(data, f, indent=2)

          print("Generated latest.json:")
          print(json.dumps(data, indent=2))
          PYEOF

      - name: Validate latest.json
        run: python3 -m json.tool latest.json > /dev/null && echo "JSON valid"

      - name: Upload latest.json and publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
